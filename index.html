<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>COMMAND CENTER</h1>
        <p class="subtitle">Stay Focused. Stay Sharp.</p>
    </header>

    <main>
        <section class="focus-card">
            <h2>Current Focus</h2>
            <p class="focus-time">00:00</p>
            <p>“The secret of getting ahead is getting started.”</p>
        </section>

        <section class="links-container">
            <h2>Daily Launchpad</h2>
            <div class="grid-links">
                <a href="https://github.com" target="_blank" class="link-button">GitHub</a>
                <a href="https://news.ycombinator.com" target="_blank" class="link-button">Hacker News</a>
                <a href="https://weather.com" target="_blank" class="link-button">Weather</a>
                <a href="https://spotify.com" target="_blank" class="link-button">Music Player</a>
            </div>
        </section>
    </main>

    <footer>
        <p>Built from scratch | July 2026</p>
    </footer>

</body>
</html>
